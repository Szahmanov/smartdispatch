[build]
  publish = "."
  functions = "netlify/functions"

# Clean URLs for the three serverless proxies.
[[redirects]]
  from = "/api/groq"
  to = "/.netlify/functions/groq"
  status = 200

[[redirects]]
  from = "/api/geocode"
  to = "/.netlify/functions/geocode"
  status = 200

[[redirects]]
  from = "/api/route"
  to = "/.netlify/functions/route"
  status = 200

[[redirects]]
  from = "/api/fuel"
  to = "/.netlify/functions/fuel"
  status = 200
